<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Guia sucinto de integração entre chatbot, IA, CRM e dashboard."
    />
    <meta name="theme-color" content="#0f172a" />
    <title>Guia de Integração: Chatbot, IA, CRM e Dashboard</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div id="app">Carregando documentação...</div>
    <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({
        startOnLoad: false,
        theme: "base",
        themeVariables: {
          primaryColor: "#dbeafe",
          primaryTextColor: "#0f172a",
          primaryBorderColor: "#3b82f6",
          lineColor: "#64748b",
          secondaryColor: "#ecfdf5",
          tertiaryColor: "#f8fafc",
          fontFamily: "Inter, system-ui, sans-serif",
        },
      });

      window.$docsify = {
        name: "Integração IA + CRM",
        repo: "EduardoSwarowsky/guia-ia-conversacional-crm",
        homepage: "README.md",
        coverpage: true,
        loadSidebar: true,
        auto2top: true,
        maxLevel: 3,
        subMaxLevel: 2,
        search: {
          placeholder: "Buscar no guia",
          noData: "Nenhum resultado",
          depth: 3,
        },
        pagination: {
          previousText: "Anterior",
          nextText: "Próximo",
          crossChapter: true,
        },
        markdown: {
          renderer: {
            code: function (code, language) {
              if (language === "mermaid") {
                return '<div class="mermaid">' + code + "</div>";
              }
              return this.origin.code.apply(this, arguments);
            },
          },
        },
        plugins: [
          function (hook) {
            hook.doneEach(function () {
              mermaid.run({ querySelector: ".mermaid" });
            });
          },
        ],
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  </body>
</html>
